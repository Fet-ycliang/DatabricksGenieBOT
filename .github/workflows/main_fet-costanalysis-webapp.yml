# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - fet-costanalysis-webapp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # Must match Azure App Service runtime

      - name: Install uv
        run: pip install uv

      - name: Export requirements.txt
        run: uv export --format requirements-txt --no-hashes > requirements.txt

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv antenv
          source antenv/bin/activate
          pip install -r requirements.txt

      # 🚫 Oryx Build 已停用：antenv 在 CI 建置，直接部署到 Azure
      # 需在 Azure App Service > Configuration > Application settings 設定：
      #   SCM_DO_BUILD_DURING_DEPLOYMENT = false
      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !.git/
            !.github/
            !tests/
            !docs/
            !poc/
            !migration_archive/
            !.claude/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_851C7D79F0C9425E8619B411795B7F72 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1B773AFB2EAE4CA7981875A2AB3C2430 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_86BDD500D9A54429972DF763E8B482E0 }}

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "fet-costanalysis-webapp"
          slot-name: "Production"
